name: Build and Release WordPress Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: vars
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare plugin package
        run: |
          mkdir -p build
          cp -r plugin/wp-amelia-woocommerce-cleanup build/
          cd build
          zip -r wp-amelia-woocommerce-cleanup-${{ steps.vars.outputs.version }}.zip wp-amelia-woocommerce-cleanup

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.vars.outputs.version }}
          files: build/wp-amelia-woocommerce-cleanup-${{ steps.vars.outputs.version }}.zip